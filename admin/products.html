<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Products</title>
<link rel="icon" type="image/png" href="../icons/product.png">

<link rel="stylesheet" href="css/admin.css">
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>

</head>

<body>

<div class="admin-container">

<!-- Sidebar -->

<div class="sidebar">

<h2>Admin Panel</h2>

<ul>
    <li onclick="go('dashboard.html')">Dashboard</li>
    <li onclick="go('products.html')">Manage Products</li>
    <li onclick="go('orders.html')">Orders</li>
    <li><button onclick="logout()" class="logout-btn">Logout</button></li>
</ul>
</div>

<!-- Main -->

<div class="main">

<h1>Manage Products</h1>

<div class="product-form">

<h2>Add Product</h2>

<input id="name" placeholder="Product name">

<input id="price" placeholder="Price">

<textarea id="description" placeholder="Description"></textarea>

<!-- Category select -->
<select id="category" required>
    <option value="">Select category</option>
    <option value="shirt">Shirt</option>
    <option value="jeans">Jeans</option>
    <option value="armani">Armani</option>
    <option value="chappals">Chappals</option>
    <option value="shoes">Shoes</option>
    <option value="flipflops">Flipflops</option>
    <option value="perfumes">Perfumes</option>
</select>

<!-- Size options will change based on selected category -->
<div id="sizeOptions"></div>

<input type="file" id="images" multiple>

<button onclick="addProduct()">Add Product</button>

</div>

<hr>

<h2>All Products</h2>

<div id="productList" class="product-grid"></div>

</div>

</div>

<script src="js/config.js"></script>
<script src="js/products.js"></script>

<script>
// small mobile toggle for sidebar
(function(){
  var sidebar = document.querySelector('.sidebar');
  if(!sidebar) return;
  var btn = document.createElement('button');
  btn.className = 'toggle-btn';
  btn.innerHTML = '\u2630'; // hamburger
  btn.setAttribute('aria-label','Toggle navigation');
  btn.addEventListener('click', function(){ sidebar.classList.toggle('open'); });
  // insert before title
  var h2 = sidebar.querySelector('h2');
  if(h2) h2.parentNode.insertBefore(btn, h2.nextSibling);
})();
</script>

</body>
</html>
