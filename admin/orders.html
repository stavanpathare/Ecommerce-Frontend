<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders</title>
<link rel="icon" type="image/png" href="../icons/orders.png">
<link rel="stylesheet" href="css/admin.css">
<meta charset="UTF-8">
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
</head>

<body>

<div class="admin-container">

<div class="sidebar">

<h2>Admin Panel</h2>

<ul>
    <li onclick="go('dashboard.html')">Dashboard</li>
    <li onclick="go('products.html')">Manage Products</li>
    <li onclick="go('orders.html')">Orders</li>
    <li><button onclick="logout()" class="logout-btn">Logout</button></li>
</ul>
</div>

<div class="main">

<h1>Orders</h1>

<div id="ordersContainer" class="orders-container">

<tr>
<th>User</th>
<th>Total</th>
<th>Status</th>
<th>Action</th>
</tr>

</div>

</div>

</div>

<script src="js/config.js"></script>
<script src="js/orders.js"></script>

<script>
// small mobile toggle for sidebar
(function(){
  var sidebar = document.querySelector('.sidebar');
  if(!sidebar) return;
  var btn = document.createElement('button');
  btn.className = 'toggle-btn';
  btn.innerHTML = '\u2630'; // hamburger
  btn.setAttribute('aria-label','Toggle navigation');
  btn.addEventListener('click', function(){ sidebar.classList.toggle('open'); });
  // insert before title
  var h2 = sidebar.querySelector('h2');
  if(h2) h2.parentNode.insertBefore(btn, h2.nextSibling);
})();
</script>

</body>

</html>
