<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="css/auth.css">
<link rel="stylesheet" href="css/style.css">

    <link rel="icon" type="image/png" href="icons/user.png">
    <script src="js/config.js"></script>
    <style>
        /* Small page-specific tweaks to match theme */
        .auth-container h2 { margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="auth-container">

    <h2>Forgot Password</h2>

    <form id="forgotForm" onsubmit="event.preventDefault(); sendReset();">
        <input type="email" id="email" placeholder="Enter your email" required>
        <button type="submit" class="auth-btn">Send Reset Link</button>
    </form>

    <p class="auth-note">We'll send a password reset link to your email.</p>

</div>

<script>
async function sendReset(){
    const email = document.getElementById("email").value.trim();
    if(!email) { alert('Please enter your email'); return; }
    try {
        const res = await fetch(window.API_BASE + "/api/auth/forgot-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        });
        const data = await res.json().catch(() => ({ message: 'No response' }));
        alert(data.message || 'Request completed');
    } catch (err) {
        console.error('forgot password error', err);
        alert('Failed to send reset link');
    }
}
</script>

</body>
</html>
