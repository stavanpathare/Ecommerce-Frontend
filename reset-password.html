<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="css/auth.css">
<link rel="stylesheet" href="css/style.css">

    <link rel="icon" type="image/png" href="icons/user.png">
        <script src="js/config.js"></script>
</head>
<body>

<div class="auth-container">

    <h2>Reset Password</h2>
    <form id="resetForm" onsubmit="event.preventDefault(); resetPass();">
        <input type="password" id="password" placeholder="New Password" required>
        <button type="submit" class="auth-btn">Reset Password</button>
    </form>

    <p id="resetNote" class="auth-note">Enter a new password to reset your account password.</p>

    <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    if(!token){
        document.getElementById('resetNote').innerText = 'Invalid or missing token. Please request a new reset link.';
        document.getElementById('resetForm').querySelector('button').disabled = true;
    }

    async function resetPass(){
        const password = document.getElementById("password").value.trim();
        if(!password) { alert('Please enter a new password'); return; }
        try {
            const res = await fetch(window.API_BASE + "/api/auth/reset-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ token, password })
            });
            const data = await res.json().catch(() => ({ message: 'No response' }));
            alert(data.message || 'Password reset');
            if(res.ok) window.location = 'login.html';
        } catch (err) {
            console.error('reset password error', err);
            alert('Failed to reset password');
        }
    }
    </script>

</div>


</body>
</html>
